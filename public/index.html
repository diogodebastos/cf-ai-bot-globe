<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Bot Activity · Cloudflare Radar</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Apply saved theme before first paint to prevent flash
      (function () {
        const saved = localStorage.getItem("theme") || "dark";
        if (saved === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0",
          "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
          "three-globe": "https://esm.sh/three-globe@2.31.1?deps=three@0.160.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="globe"></div>
    <span class="bracket tl"></span>
    <span class="bracket tr"></span>
    <span class="bracket bl"></span>
    <span class="bracket br"></span>
    <button id="theme-toggle" aria-label="Toggle theme"></button>
    <div id="left-panel">
      <div id="hud">
        <div class="title">AI bot activity</div>
        <div class="sub">Cloudflare Radar · last hour</div>
        <div class="stat"><span class="label">Requests</span><span id="total">—</span></div>
        <div class="stat"><span class="label">Updated</span><span id="updated">—</span></div>
        <div class="stat"><span class="label">Sun over</span><span id="sun">—</span></div>
        <div class="stat"><span class="label">Moon over</span><span id="moon">—</span></div>
        <div id="status"></div>
      </div>
      <div id="data-hub">
        <div class="title">distribution</div>
        <div class="sub">request share · all regions</div>
        <div id="country-bars"></div>
        <div class="hub-footer">
          <span class="label">Regions active</span>
          <span id="country-count">—</span>
        </div>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
